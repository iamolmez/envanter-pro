services:
  - type: web
    name: inventory-backend
    env: node
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./dev.db
      - key: CORS_ORIGIN
        value: https://envanter-pro-seven.vercel.app
