services:
  - type: web
    name: inventory-backend
    env: node
    region: frankfurt
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://envanter-pro-seven.vercel.app,https://envanter-62mcpgpbv-iamolmnezs-projects.vercel.app,https://envanter-62mcpgpbv-iamolmnezs-projects.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: EXCHANGE_RATE_CRON_SCHEDULE
        value: "0 */6 * * *"

databases:
  - name: inventory-db
    region: frankfurt
    plan: free
